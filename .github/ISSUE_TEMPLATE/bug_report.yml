name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: Version
      description: What version are you running?
      placeholder: "v0.1.0-alpha"
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Hardware Device
      options:
        - CPU
        - GPU (Intel Arc / Integrated)
        - NPU (Intel AI Boost)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do before the bug appeared?
      value: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Backend logs
      description: Paste any relevant console output or runtime logs.
      render: shell
